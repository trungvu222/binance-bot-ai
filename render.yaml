services:
  - type: web
    name: binance-bot-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web_dashboard.py
    plan: free
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_TESTNET
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
